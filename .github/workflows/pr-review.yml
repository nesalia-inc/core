name: PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Allow both human and bot (Marty) triggered runs
    if: ${{ github.event.sender.type == 'User' || github.event.sender.login == 'marty-action[bot]' }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate Marty token
        id: marty-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.MARTY_APP_ID }}
          private-key: ${{ secrets.MARTY_APP_PRIVATE_KEY }}

      # Add reaction to show review started
      - name: Add eyes reaction
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          gh api repos/${{ github.repository }}/issues/$PR_NUMBER/reactions \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -d '{"content":"eyes"}' \
            2>/dev/null || echo "Reaction failed"

      - name: Run Marty PR Review
        uses: nesalia-inc/marty-action@1.0.0
        with:
          github_token: ${{ steps.marty-token.outputs.token }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            AUTHOR: ${{ github.event.pull_request.user.login }}
            TITLE: ${{ github.event.pull_request.title }}

            Please review this pull request comprehensively:

            ## Review Focus Areas

            ### Code Quality
            - Code follows best practices and design patterns
            - Proper error handling and edge cases
            - No code duplication (DRY principle)
            - Clear and maintainable code structure

            ### Security
            - No hardcoded secrets or credentials
            - Proper input validation and sanitization
            - SQL injection and XSS vulnerabilities
            - Authentication and authorization checks
            - Sensitive data handling

            ### Performance
            - Potential performance bottlenecks
            - Efficient database queries
            - Proper caching strategies
            - Resource cleanup and memory leaks

            ### Testing
            - Adequate test coverage for changes
            - Edge cases covered
            - Test quality and assertions

            ### Documentation
            - README updated if needed
            - Inline comments for complex logic
            - API documentation updated
            - Breaking changes documented

            ## Review Output Format

            Use inline comments for specific code issues (highlight exact lines).
            Use top-level PR comments for general observations and summary.

            Structure your top-level comment as:
            - **Summary**: Brief overview
            - **Critical Issues**: Must-fix items
            - **Recommendations**: Suggestions for improvement
            - **Positive Notes**: Good practices observed

            Note: The PR branch is already checked out in the current working directory.

            Only post GitHub comments - don't submit review text as messages.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
            --max-turns 100

        env:
          ANTHROPIC_BASE_URL: https://api.minimax.io/anthropic
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.MINIMAX_API_KEY }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: MiniMax-M2.5
          ANTHROPIC_DEFAULT_HAIKU_MODEL: MiniMax-M2.5
          ANTHROPIC_DEFAULT_OPUS_MODEL: MiniMax-M2.5

      # Add reaction to show review complete
      - name: Add success reaction
        if: success()
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          # Only remove eyes reaction from this workflow (user ID 41898282 is marty-action)
          EYES_REACTIONS=$(gh api repos/${{ github.repository }}/issues/$PR_NUMBER/reactions --jq '.[] | select(.user.id == 41898282 and .content == "eyes").id' 2>/dev/null)
          for reaction_id in $EYES_REACTIONS; do
            gh api repos/${{ github.repository }}/issues/$PR_NUMBER/reactions/$reaction_id -X DELETE 2>/dev/null || true
          done
          gh api repos/${{ github.repository }}/issues/$PR_NUMBER/reactions \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -d '{"content":"white_check_mark"}' \
            2>/dev/null || echo "Failed to add reaction"

      # Add reaction to show error
      - name: Add error reaction
        if: failure()
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          # Only remove eyes reaction from this workflow
          EYES_REACTIONS=$(gh api repos/${{ github.repository }}/issues/$PR_NUMBER/reactions --jq '.[] | select(.user.id == 41898282 and .content == "eyes").id' 2>/dev/null)
          for reaction_id in $EYES_REACTIONS; do
            gh api repos/${{ github.repository }}/issues/$PR_NUMBER/reactions/$reaction_id -X DELETE 2>/dev/null || true
          done
          gh api repos/${{ github.repository }}/issues/$PR_NUMBER/reactions \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -d '{"content":"x"}' \
            2>/dev/null || echo "Failed to add reaction"
