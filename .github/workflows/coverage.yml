name: Coverage

on:
  push:
    branches: [main]
    paths:
      - 'packages/core/src/**'
      - 'packages/core/tests/**'
      - 'packages/core/vitest.config.ts'
  pull_request:
    branches: [main]
    paths:
      - 'packages/core/src/**'
      - 'packages/core/tests/**'
      - 'packages/core/vitest.config.ts'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: |
          cd packages/core
          npx vitest run --coverage

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const fs = require('fs');
              const coveragePath = './packages/core/coverage/coverage-summary.json';

              if (!fs.existsSync(coveragePath)) {
                console.log('Coverage file not found, skipping comment');
                return;
              }

              const coverage = JSON.parse(fs.readFileSync(coveragePath, 'utf8'));

              const lines = coverage.total.lines;
              const statements = coverage.total.statements;
              const functions = coverage.total.functions;
              const branches = coverage.total.branches;

              const coverageTable = `
| Metric | Coverage |
|--------|----------|
| Lines | ${lines.pct}% |
| Statements | ${statements.pct}% |
| Functions | ${functions.pct}% |
| Branches | ${branches.pct}% |
`;

              const body = `## Coverage Report

${coverageTable}

> Coverage report generated by GitHub Actions
`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: body
              });
            } catch (error) {
              console.log('Failed to post coverage comment:', error.message);
            }
